name: EmergencyCashLoans Vulture Refresh

on:
  schedule:
    # Thursday at 04:15 UTC (Staggered to save your 2,000 mins)
    - cron: "15 4 * * 4"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # Installing the missing OpenAI module that caused the #3 failure
          npm install openai dotenv 
          pip install requests boto3

      - name: Run Vulture Engine
        run: |
          # 1. Runs the Python generator (Confirmed working in last run)
          python article-generator.py
          
          # 2. Runs the AI workers (Now has OpenAI dependency)
          node ai-blog-worker.js
          node generate-seo-articles.js
          echo "EmergencyCashLoans Vulture Refresh Complete"

      - name: Deploy to GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vulture Heartbeat: EmergencyCashLoans Weekly Sync"
          branch: main
