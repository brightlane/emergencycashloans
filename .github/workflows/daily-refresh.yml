name: EmergencyCashLoans Vulture Refresh

on:
  schedule:
    # Thursday at 04:15 UTC (Staggered shift)
    - cron: "15 4 * * 4"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests
          # Add any other libraries your script needs here

      - name: Run Vulture Engine
        run: |
          # Use your actual python script name here
          python manychat-gen.py
          echo "Vulture Refresh Complete"

      - name: Deploy to GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vulture Heartbeat: EmergencyCashLoans Weekly Sync"
          branch: main
