name: EmergencyCashLoans Vulture Refresh

on:
  schedule:
    # Thursday at 04:15 UTC
    - cron: "15 4 * * 4"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          npm install
          pip install requests boto3  # Boto3 found in your commit history

      - name: Run Vulture Engine
        run: |
          # Running your high-volume generators
          python article-generator.py
          node ai-blog-worker.js
          node generate-seo-articles.js
          echo "EmergencyCashLoans Vulture Refresh Complete"

      - name: Deploy to GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vulture Heartbeat: EmergencyCashLoans Weekly Sync"
          branch: main
