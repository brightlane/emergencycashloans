name: "Z-RUN-VULTURE-ENGINE" # This name starts with Z so it's easy to find

on:
  workflow_dispatch: # This is what creates the "Run" button
  schedule:
    - cron: "15 4 * * 4"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Tools
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install ALL Dependencies
        run: |
          npm install openai axios dotenv fs-extra path
          pip install requests boto3 pandas

      - name: 4. Run Generation
        run: |
          python article-generator.py
          node ai-blog-worker.js
          node generate-seo-articles.js

      - name: 5. Save to Site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vulture Update"
