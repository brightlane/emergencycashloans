- name: 4. Force Sync and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Add everything to the 'staging' area
          git add pages/*.html
          
          # 2. Stash the changes so the floor is clean for a pull
          git stash
          
          # 3. Pull the latest changes from the repo (Rebase keeps it clean)
          git pull --rebase origin main
          
          # 4. Bring your pages back from the stash
          git stash pop || echo "No stash to pop"
          
          # 5. Final add and commit
          git add pages/*.html
          git commit -m "MaxLend Empire Sync" || echo "No changes to commit"
          git push origin main
