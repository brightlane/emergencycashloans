name: Smart SEO Page Generator

permissions:
  contents: write

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug files
        run: ls -la

      - name: Generate SEO Pages
        shell: bash
        run: |
          set -e

          mkdir -p pages/emergency
          mkdir -p pages/payday
          mkdir -p pages/nocredit
          mkdir -p pages/advance
          mkdir -p pages/general

          if [ ! -f keywords.txt ]; then
            echo "ERROR: keywords.txt is missing"
            exit 1
          fi

          echo "keywords.txt found:"
          cat keywords.txt

          created=0

          while IFS= read -r keyword || [ -n "$keyword" ]; do

            [ -z "$keyword" ] && continue

            cluster="general"

            if [[ "$keyword" == *"emergency"* ]]; then cluster="emergency"; fi
            if [[ "$keyword" == *"payday"* ]]; then cluster="payday"; fi
            if [[ "$keyword" == *"no credit"* ]]; then cluster="nocredit"; fi
            if [[ "$keyword" == *"cash advance"* ]]; then cluster="advance"; fi

            slug=$(echo "$keyword" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

            FILE="pages/$cluster/$slug.html"

            echo "Creating: $FILE"
            created=$((created+1))

            cat > "$FILE" <<EOF
<!DOCTYPE html>
<html>
<head>
  <title>$keyword | Emergency Cash Loans</title>
</head>
<body>
<h1>$keyword</h1>
<p>Cluster: $cluster</p>
</body>
</html>
EOF

          done < keywords.txt

          echo "Pages created: $created"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add pages/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Generate SEO pages"
          git push
