name: SEO Engine Runner

permissions:
  contents: write

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # INSTALL NODE (CRITICAL FIX)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # RUN KEYWORD GENERATOR
      # =========================
      - name: Generate Keywords
        run: node keyword-generator.js

      # =========================
      # DEBUG OUTPUT (IMPORTANT)
      # =========================
      - name: Show generated file
        run: |
          ls -la
          cat keywords.txt || echo "keywords.txt missing"

      # =========================
      # COMMIT RESULT
      # =========================
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add keywords.txt

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Generated keywords"
          git push
