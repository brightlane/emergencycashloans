name: Smart SEO Page Generator

permissions:
  contents: write

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate SEO Pages
        shell: bash
        run: |
          set -e

          mkdir -p pages/emergency
          mkdir -p pages/payday
          mkdir -p pages/nocredit
          mkdir -p pages/advance
          mkdir -p pages/general

          if [ ! -f keywords.txt ]; then
            echo "keywords.txt missing"
            exit 0
          fi

          while IFS= read -r keyword || [ -n "$keyword" ]; do

            [ -z "$keyword" ] && continue

            cluster="general"

            if [[ "$keyword" == *"emergency"* ]]; then cluster="emergency"; fi
            if [[ "$keyword" == *"payday"* ]]; then cluster="payday"; fi
            if [[ "$keyword" == *"no credit"* ]]; then cluster="nocredit"; fi
            if [[ "$keyword" == *"cash advance"* ]]; then cluster="advance"; fi

            slug=$(echo "$keyword" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

            FILE="pages/$cluster/$slug.html"

            cat > "$FILE" <<EOF
<!DOCTYPE html>
<html>
<head>
  <title>$keyword | Emergency Cash Loans</title>
  <meta name="description" content="$keyword information and options">
  <meta name="robots" content="index, follow">
</head>
<body>

<h1>$keyword</h1>

<p>
This page is about $keyword and belongs to the $cluster topic cluster.
</p>

<ul>
  <li><a href="/emergencycashloans/">Home</a></li>
  <li><a href="/pages/$cluster/">More in $cluster</a></li>
</ul>

</body>
</html>
EOF

          done < keywords.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pages/
          git commit -m "Generate SEO pages" || exit 0
          git push
