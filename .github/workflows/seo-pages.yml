name: SEO Master Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =====================
      # CHECKOUT
      # =====================
      - uses: actions/checkout@v4

      # =====================
      # NODE SETUP
      # =====================
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # =====================
      # SAFETY CHECK
      # =====================
      - name: Check repo
        run: |
          echo "ROOT FILES"
          ls || true

      # =====================
      # ENSURE FILE EXISTS
      # =====================
      - name: Validate generator
        run: |
          if [ ! -f keyword-generator.js ]; then
            echo "MISSING keyword-generator.js"
            exit 1
          fi

      # =====================
      # RUN GENERATOR
      # =====================
      - name: Generate keywords
        run: node keyword-generator.js

      # =====================
      # VERIFY OUTPUT
      # =====================
      - name: Check output
        run: |
          if [ ! -f keywords.txt ]; then
            echo "keywords.txt NOT CREATED"
            exit 1
          fi

          head -20 keywords.txt

      # =====================
      # COMMIT OUTPUT
      # =====================
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add keywords.txt

          git diff --cached --quiet && exit 0

          git commit -m "SEO build update"
          git push
