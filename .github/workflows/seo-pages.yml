name: Smart SEO Page Generator

permissions:
  contents: write

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate SEO Pages with Smart Clusters
        shell: bash
        run: |
          set -e

          mkdir -p pages

          # =========================
          # CLUSTER PATTERN SYSTEM
          # =========================

          emergency_patterns=(
            "emergency cash" "emergency loan" "urgent cash" "money emergency"
            "cash emergency" "financial emergency" "emergency funds"
            "emergency help" "urgent money" "cash urgently"
            "emergency funding" "emergency assistance"
          )

          payday_patterns=(
            "payday loan" "fast payday" "payday advance" "paycheck advance"
            "early paycheck" "wage advance" "salary advance"
            "pay advance" "cash before payday"
          )

          nocredit_patterns=(
            "no credit" "no credit check" "bad credit" "poor credit"
            "credit free" "credit not required" "no credit needed"
            "no credit history"
          )

          advance_patterns=(
            "cash advance" "instant cash" "money advance" "quick advance"
            "instant advance" "fast advance" "direct advance"
            "advance cash" "instant money"
          )

          general_patterns=(
            "loan" "cash loan" "personal loan" "quick loan"
            "online loan" "fast loan" "instant loan"
          )

          match_cluster() {
            local keyword="$1"

            for p in "${emergency_patterns[@]}"; do
              [[ "$keyword" == *"$p"* ]] && echo "emergency" && return
            done

            for p in "${payday_patterns[@]}"; do
              [[ "$keyword" == *"$p"* ]] && echo "payday" && return
            done

            for p in "${nocredit_patterns[@]}"; do
              [[ "$keyword" == *"$p"* ]] && echo "nocredit" && return
            done

            for p in "${advance_patterns[@]}"; do
              [[ "$keyword" == *"$p"* ]] && echo "advance" && return
            done

            for p in "${general_patterns[@]}"; do
              [[ "$keyword" == *"$p"* ]] && echo "general" && return
            done

            echo "general"
          }

          # =========================
          # PAGE GENERATION
          # =========================

          if [ ! -f keywords.txt ]; then
            echo "keywords.txt not found"
            exit 0
          fi

          while IFS= read -r keyword || [ -n "$keyword" ]; do

            [ -z "$keyword" ] && continue

            cluster=$(match_cluster "$keyword")

            slug=$(echo "$keyword" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

            mkdir -p "pages/$cluster"

            cat > "pages/$cluster/$slug.html" <<EOF
<!DOCTYPE html>
<html>
<head>
  <title>$keyword | Emergency Cash Loans</title>
  <meta name="description" content="Information about $keyword">
  <meta name="robots" content="index, follow">
</head>

<body>

<h1>$keyword</h1>

<p>
This page belongs to the <strong>$cluster</strong> topic cluster.
It covers $keyword options including eligibility, approval speed, and funding methods.
</p>

<h3>Related pages</h3>
<ul>
  <li><a href="/emergencycashloans/">Home</a></li>
  <li><a href="/pages/$cluster/">More in this category</a></li>
</ul>

</body>
</html>
EOF

          done < keywords.txt

      - name: Commit pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add pages/
          git commit -m "Smart SEO cluster generation" || exit 0
          git push
