name: Backlink Seeder (Index Boost)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate simple link hub page
        run: |
          mkdir -p pages/hub

          echo "Building link hub..."

          cat > pages/hub/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <title>Loan Resource Hub</title>
  <meta name="description" content="Financial resource hub for loans, cash advances, and payday guidance">
</head>
<body>

<h1>Loan Resource Hub</h1>

<ul>
  <li><a href="/pages/emergency/">Emergency Cash Loans</a></li>
  <li><a href="/pages/payday/">Payday Loans Guide</a></li>
  <li><a href="/pages/advance/">Cash Advance Info</a></li>
  <li><a href="/pages/nocredit/">No Credit Loans</a></li>
</ul>

<p>This hub helps organize financial resources and improve discoverability.</p>

</body>
</html>
EOF

      - name: Create RSS feed (for indexing signals)
        run: |
          mkdir -p pages/feed

          cat > pages/feed/rss.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8" ?>
<rss version="2.0">
<channel>
  <title>Emergency Cash Loans Feed</title>
  <link>https://YOURDOMAIN.com</link>
  <description>Latest financial guides and loan resources</description>

  <item>
    <title>Emergency Cash Loans Guide</title>
    <link>https://YOURDOMAIN.com/pages/emergency/</link>
  </item>

  <item>
    <title>Payday Loan Guide</title>
    <link>https://YOURDOMAIN.com/pages/payday/</link>
  </item>

</channel>
</rss>
EOF

      - name: Ping search engines
        run: |
          SITE="https://YOURDOMAIN.com/sitemap.xml"

          curl -s "https://www.google.com/ping?sitemap=$SITE" || true
          curl -s "https://www.bing.com/ping?sitemap=$SITE" || true

          echo "Done"
