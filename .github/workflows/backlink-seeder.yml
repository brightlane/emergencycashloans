name: Backlink Seeder (Debug Safe)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          echo "ROOT:"
          ls -la

          echo "PAGES:"
          ls -la pages || echo "No pages folder"

      - name: Confirm workflow runs
        run: echo "Workflow executed successfully"
