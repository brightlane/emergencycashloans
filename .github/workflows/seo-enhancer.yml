for file in pages/*.html; do
  [ -f "$file" ] || continue

  tmp="${file}.tmp"

  awk '
    BEGIN { done=0 }

    {
      print $0

      if ($0 ~ /<\/body>/ && done == 0) {
        print "<div class=\"internal-links\">"
        print "<a href=\"/emergencycashloans/\">Home</a>"
        print "<a href=\"/pages/cash-advance-guide.html\">Cash Advance</a>"
        print "<a href=\"/pages/payday-loans-explained.html\">Payday Loans</a>"
        print "</div>"

        done=1
      }
    }
  ' "$file" > "$tmp"

  mv "$tmp" "$file"
done
