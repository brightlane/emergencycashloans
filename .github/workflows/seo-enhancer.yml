name: SEO Enhancer (Safe Mode)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  safe-enhance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify pages folder
        run: |
          if [ ! -d "pages" ]; then
            echo "No pages folder found"
            exit 0
          fi

      - name: Simple link injection (safe)
        run: |
          echo "Running safe SEO enhancer..."

          for file in pages/*.html; do
            [ -f "$file" ] || continue

            echo "Processing $file"

            tmp="${file}.tmp"

            awk '
              {
                print $0
                if ($0 ~ /<\/body>/) {
                  print "<hr>"
                  print "<p><a href=\"/emergencycashloans/\">Home</a></p>"
                }
              }
            ' "$file" > "$tmp"

            mv "$tmp" "$file"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pages/ || true
          git commit -m "safe seo enhancement" || exit 0
          git push || true
