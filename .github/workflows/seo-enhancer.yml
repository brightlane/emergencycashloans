echo "SAFE PAGE EXPAND START"

for file in pages/*.html; do
  [ -f "$file" ] || continue

  tmp="${file}.tmp"

  awk '
    BEGIN { done=0 }

    {
      print $0

      if ($0 ~ /<\/body>/ && done == 0) {

        print "<hr>"
        print "<div class=\"internal-links\">"
        print "<ul>"
        print "<li><a href=\"/emergencycashloans/\">Home</a></li>"
        print "<li><a href=\"/pages/cash-advance-guide.html\">Cash Advance</a></li>"
        print "<li><a href=\"/pages/payday-loans-explained.html\">Payday Loans</a></li>"
        print "<li><a href=\"/pages/installment-loans-guide.html\">Installment Loans</a></li>"
        print "</ul>"
        print "</div>"

        done=1
      }
    }
  ' "$file" > "$tmp"

  mv "$tmp" "$file"
done

echo "SAFE PAGE EXPAND DONE"
