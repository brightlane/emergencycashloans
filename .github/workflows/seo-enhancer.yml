name: SEO Enhancer (Meta + Structured Data)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  enhance:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # VERIFY PAGES EXIST
      # =========================
      - name: Check pages folder
        run: |
          if [ ! -d pages ]; then
            echo "No pages folder - skipping"
            exit 0
          fi

      # =========================
      # INJECT SEO META + JSON-LD
      # =========================
      - name: Enhance SEO on pages
        run: |
          BASE_URL="https://brightlane.github.io/emergencycashloans"

          for file in pages/*.html; do

            if [ -f "$file" ]; then

              filename=$(basename "$file")

              # skip index
              if [ "$filename" = "index.html" ]; then
                continue
              fi

              # derive keyword from filename
              keyword=$(echo "$filename" | sed 's/-/ /g' | sed 's/.html//g')

              # inject meta tags after <head>
              sed -i "/<head>/a \
<meta name=\"description\" content=\"Information about $keyword\">\n\
<link rel=\"canonical\" href=\"$BASE_URL/pages/$filename\">\n\
<script type=\"application/ld+json\">\n\
{\n\
  \"@context\": \"https://schema.org\",\n\
  \"@type\": \"WebPage\",\n\
  \"name\": \"$keyword\",\n\
  \"url\": \"$BASE_URL/pages/$filename\"\n\
}\n\
</script>" "$file"

            fi

          done

      # =========================
      # COMMIT CHANGES SAFELY
      # =========================
      - name: Commit SEO improvements
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add pages/ || true

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add SEO metadata + structured data"
          git push
