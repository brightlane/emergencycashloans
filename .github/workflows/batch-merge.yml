name: Batch Merge Engine (High Throughput)

on:
  schedule:
    - cron: "*/5 * * * *"  # runs every 5 minutes
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: |
          git pull origin main --rebase

      - name: Collect worker outputs
        run: |
          mkdir -p merged

          # Collect all workflow outputs (adjust path if needed)
          find . -type f -path "*output*" -name "*.json" -exec cp {} merged/ \; || true

          # fallback safety
          ls -R merged || echo "No outputs found"

      - name: Merge into working directory
        run: |
          mkdir -p final

          # simple merge (we’ll upgrade this in next step)
          cp -r merged/* final/ 2>/dev/null || true
          cp -r final/* . 2>/dev/null || true

      - name: Commit batch update
        run: |
          git add .

          git commit -m "Batch merge (5-min engine)" || echo "No changes to commit"

          git push origin main
