name: Output Registry (System Memory Layer)

on:
  workflow_run:
    workflows:
      - "Orchestrator Guard (System Safety Layer)"
    types:
      - completed

  workflow_dispatch:

jobs:
  registry:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest state
        run: |
          git pull origin main --rebase

      # Only install dependencies if requirements.txt exists
      - name: Install dependencies
        if: -e requirements.txt
        run: |
          pip install -r requirements.txt  # Ensure you have a requirements.txt file

      - name: Initialize registry system
        run: |
          mkdir -p registry
          if [ ! -f registry/output-log.json ]; then
            echo "[]" > registry/output-log.json
          fi

      - name: Build registry entries
        run: |
          python3 - << 'EOF'
import os
import json
import hashlib
from datetime import datetime

REGISTRY_FILE = "registry/output-log.json"

# Load existing registry data
with open(REGISTRY_FILE, "r") as f:
    data = json.load(f)

def hash_content(content):
    """Generate a hash for the content of a file."""
    return hashlib.md5(content.encode()).hexdigest()

new_entries = []

# Traverse files in the directory and create new registry entries
for root, dirs, files in os.walk("."):
    for file in files:
        if file.endswith(".json") or file.endswith(".txt"):
            path = os.path.join(root, file)

            try:
                with open(path, "r", encoding="utf-8") as f:
                    content = f.read()

                entry = {
                    "file": path,
                    "hash": hash_content(content),
                    "timestamp": datetime.utcnow().isoformat(),
                    "size": len(content)
                }

                # Avoid duplicates in the registry
                if not any(e["hash"] == entry["hash"] for e in data):
                    new_entries.append(entry)

            except Exception as e:
                print(f"Error reading {path}: {e}")
                pass

# Add new entries to the registry
data.extend(new_entries)

# Write the updated data back to the registry file
with open(REGISTRY_FILE, "w") as f:
    json.dump(data, f, indent=2)

print(f"Added {len(new_entries)} new entries to the registry.")
EOF

      - name: Commit registry updates
        run: |
          git add registry/
          git commit -m "Update output registry (system memory layer)" || echo "No changes"
          git push origin main
