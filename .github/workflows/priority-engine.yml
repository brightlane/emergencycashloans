name: Priority Engine

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  priority-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # If you don't need Node.js dependencies, remove the setup and install steps.
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20.x'

      # - name: Install dependencies
      #   run: |
      #     npm install

      - name: Run the priority engine script
        run: |
          python3 priority-engine.py  # Or your actual script

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Update priority engine results" || echo "No changes"
          git push origin main
