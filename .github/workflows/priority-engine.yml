name: Priority Engine

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  priority-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run priority engine
        run: npm run priority --if-present

      - name: Build step
        run: npm run build --if-present

      - name: Test step
        run: npm test --if-present
