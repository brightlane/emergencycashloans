name: Auto Keyword Expansion

on:
  schedule:
    - cron: "0 0 * * 0"  # weekly expansion
  workflow_dispatch:

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Expand keywords
        run: |
          base="keywords.txt"
          output="keywords-expanded.txt"

          echo "" > $output

          modifiers="fast;instant;emergency;same day;online;no credit check;quick"
          intents="apply;requirements;eligibility;how to get;best;options"

          while read keyword; do
            for m in $(echo $modifiers | tr ';' ' '); do
              echo "$m $keyword" >> $output
            done

            for i in $(echo $intents | tr ';' ' '); do
              echo "$keyword $i" >> $output
            done

          done < $base

      - name: Deduplicate
        run: |
          sort keywords-expanded.txt | uniq > keywords-final.txt

      - name: Replace keyword file
        run: |
          mv keywords-final.txt keywords.txt

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add keywords.txt
          git commit -m "Auto keyword expansion" || exit 0
          git push
