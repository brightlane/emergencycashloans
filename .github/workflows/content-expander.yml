- name: Expand SEO links safely
  run: |
    echo "Starting safe expansion..."

    mkdir -p pages

    for file in pages/*.html; do
      [ -f "$file" ] || continue

      echo "Processing $file"

      # SAFE replacement (NO broken sed)
      sed -i 's|EMERGENCY_KEYWORD|emergency cash loans|g' "$file"
      sed -i 's|PAYDAY_KEYWORD|payday loans|g' "$file"
      sed -i 's|CASH_ADVANCE_KEYWORD|cash advance loans|g' "$file"

    done

    echo "Expansion complete"
