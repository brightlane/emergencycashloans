name: Content Expander (Safe Mode)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check pages folder
        run: |
          echo "Checking pages..."
          ls -la pages || echo "No pages folder"

      - name: Safe expansion (NO SED)
        run: |
          echo "Starting safe expansion..."

          for file in pages/*.html; do
            [ -f "$file" ] || continue

            echo "Processing $file"

            # SAFE replacement using awk (no sed crashes)
            awk '
              { gsub("EMERGENCY","emergency cash loans"); }
              { gsub("PAYDAY","payday loans"); }
              { gsub("CASHADV","cash advance loans"); }
              1
            ' "$file" > tmp && mv tmp "$file"

          done

          echo "Expansion complete"
