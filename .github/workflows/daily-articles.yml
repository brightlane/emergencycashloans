name: Daily Articles Workflow

on:
  push:
    branches:
      - main  # Trigger the workflow on pushes to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch

jobs:
  dedup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Remove or comment out the install dependencies step if you don't have requirements.txt
      # - name: Install dependencies
      #   run: |
      #     pip install -r requirements.txt

      - name: Run deduplication script
        run: |
          python deduplication.py  # Adjust this based on your actual script

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Fix duplicate entries" || echo "No changes"
          git push origin main
