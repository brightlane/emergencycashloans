name: Auto Generate Articles

# Triggering on every minute and manual trigger
on:
  schedule:
    - cron: '* * * * *'  # Trigger every minute
  workflow_dispatch:  # Allows for manual trigger as well

jobs:
  generate_articles:
    runs-on: ubuntu-latest
    environment: production  # Optional, depends on your environment setup

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1  # Ensure full checkout

      # Set up Python environment
      - name: Set up Python 3.x
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Make sure you have all dependencies in the requirements.txt

      # Set up AWS credentials for S3 uploads
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}  # AWS credentials from GitHub Secrets
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'  # Adjust region as needed

      # Run the article generation script
      - name: Run article generation script
        run: |
          echo "Starting article generation..."
          python generate_and_upload_keywords.py || { echo 'Article generation failed! Check logs!'; exit 1; }
        
      # Check for success and print logs
      - name: Check script success and logs
        run: |
          echo "Checking if script executed successfully..."
          if [ $? -eq 0 ]; then
            echo "Article generation script executed successfully!"
          else
            echo "Article generation script failed. Exiting..."
            exit 1
          fi

      # Optional: Upload to S3 if article generation is successful
      - name: Upload to S3
        run: |
          echo "Uploading generated content to S3..."
          aws s3 cp path/to/generated/file s3://your-bucket-name/ --recursive
        continue-on-error: false  # This ensures the job fails if the upload fails
