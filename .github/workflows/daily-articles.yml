name: Dedup Engine

on:
  push:
    branches:
      - main  # Trigger the workflow when a push happens to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch

jobs:
  dedup:
    runs-on: ubuntu-latest  # Specify the OS for the job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Ensures the full history is fetched

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt  # Ensure you have a requirements.txt file

      - name: Run deduplication script
        run: |
          python deduplicate.py  # Adjust this based on your actual script

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Fix duplicate entries" || echo "No changes"
          git push origin main
