name: Auto Generate Articles Every Minute

on:
  schedule:
    - cron: '* * * * *'  # Runs every minute
  workflow_dispatch:  # Optional: allows manual triggering

jobs:
  generate_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script to generate articles
        run: |
          python generate_and_upload_keywords.py  # Replace with your script
