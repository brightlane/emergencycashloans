name: Auto Generate Articles

on:
  schedule:
    - cron: '* * * * *'  # Trigger the job every minute (adjust timing as needed)
  workflow_dispatch:  # This allows you to manually trigger the workflow

jobs:
  generate_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Ensure you’re using the latest checkout action

      - name: Set up Python
        uses: actions/setup-python@v3  # Ensure you're using the latest setup-python
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Ensure you have all dependencies in requirements.txt

      - name: Run article generation script
        run: |
          python generate_and_upload_keywords.py || { echo 'Script failed!'; exit 1; }

      - name: Upload to S3
        run: |
          aws s3 cp path/to/generated/articles s3://your-bucket-name/ --recursive  # Replace with the correct S3 path
