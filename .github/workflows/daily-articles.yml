name: Auto Generate Articles

on:
  schedule:
    - cron: '* * * * *'  # This cron expression runs every minute
  workflow_dispatch:  # This allows you to manually trigger the workflow as well

jobs:
  generate_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Updated version

      - name: Set up Python
        uses: actions/setup-python@v3  # Updated version
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the article generation script
        run: |
          python generate_and_upload_keywords.py || { echo 'Script failed!'; exit 1; }

      - name: Upload to S3 (if applicable)
        run: |
          aws s3 cp path/to/generated/file s3://your-bucket-name/ --recursive
