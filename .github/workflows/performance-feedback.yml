name: Performance Feedback Loop (Self-Improving Layer)

on:
  workflow_run:
    workflows:
      - "Orchestrator Guard (System Safety Layer)"
    types:
      - completed

  workflow_dispatch:

jobs:
  feedback:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest state
        run: |
          git pull origin main --rebase

      - name: Initialize feedback store
        run: |
          mkdir -p analytics

          if [ ! -f analytics/performance.json ]; then
            echo "[]" > analytics/performance.json
          fi

      - name: Collect system signals
        run: |
          python3 - << 'EOF'
import os
import json
from datetime import datetime

FILE = "analytics/performance.json"

with open(FILE, "r") as f:
    data = json.load(f)

def scan_files():
    stats = {
        "seo_files": 0,
        "content_files": 0,
        "keyword_files": 0
    }

    for root, dirs, files in os.walk("."):
        for f in files:
            name = f.lower()

            if "seo" in name:
                stats["seo_files"] += 1
            elif "keyword" in name:
                stats["keyword_files"] += 1
            elif "content" in name:
                stats["content_files"] += 1

    return stats

snapshot = {
    "timestamp": datetime.utcnow().isoformat(),
    "metrics": scan_files()
}

data.append(snapshot)

with open(FILE, "w") as f:
    json.dump(data, f, indent=2)
EOF

      - name: Commit performance data
        run: |
          git add analytics/

          git commit -m "Performance feedback update (self-learning layer)" || echo "No changes"

          git push origin main
