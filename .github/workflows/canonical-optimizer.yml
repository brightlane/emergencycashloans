name: Canonical Optimizer (Safe Mode)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  canonical:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check structure only
        run: |
          echo "Checking repo structure..."
          ls -la

          if [ -d "pages" ]; then
            echo "Pages folder exists"
            ls -la pages
          else
            echo "No pages folder found"
          fi

      - name: Safe completion
        run: |
          echo "Canonical optimizer completed (no file edits)"
