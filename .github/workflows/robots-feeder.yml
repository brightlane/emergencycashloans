name: Robots TXT Feeder

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  robots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate robots.txt
        run: |
          cat > robots.txt << 'EOF'
User-agent: *
Allow: /

Disallow: /node_modules/
Disallow: /.github/
Disallow: /network/

Sitemap: https://YOURDOMAIN.com/sitemap.xml
EOF

      - name: Move to network folder
        run: |
          mkdir -p network
          cp robots.txt network/robots.txt

      - name: Commit robots.txt changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add robots.txt network/robots.txt

          git commit -m "Update robots.txt (auto feeder)" || echo "No changes to commit"

          git push || echo "Nothing to push"

      - name: Show result
        run: |
          echo "=== ROBOTS.TXT ==="
          cat robots.txt
