name: Robots TXT Feeder (Safe Mode)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  robots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate robots.txt
        run: |
          mkdir -p network

          cat > robots.txt << 'EOF'
User-agent: *
Allow: /

Disallow: /node_modules/
Disallow: /.github/
Disallow: /network/

Sitemap: https://YOURDOMAIN.com/sitemap.xml
EOF

      - name: Save network copy
        run: cp robots.txt network/robots.txt

      - name: Show output
        run: |
          echo "=== robots.txt ==="
          cat robots.txt
