name: Robots Feeder Stable

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  robots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create robots.txt safely
        run: |
          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "Disallow: /node_modules/" >> robots.txt
          echo "Disallow: /.github/" >> robots.txt

      - name: Create network folder copy
        run: |
          mkdir -p network
          cp robots.txt network/robots.txt

      - name: Show result
        run: cat robots.txt
