name: Daily Articles Workflow

# This allows the workflow to be triggered daily and manually.
on:
  schedule:
    - cron: '0 0 * * *'  # This cron expression runs every day at midnight (UTC)
  workflow_dispatch:  # This allows you to manually trigger the workflow if needed

jobs:
  generate_articles:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from your repository
      - name: Checkout repository code
        uses: actions/checkout@v3
        continue-on-error: false  # Fail the workflow if this step fails

      # Set up Python environment for running the article generation script
      - name: Set up Python environment
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
        continue-on-error: false

      # Install necessary dependencies (from your requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: false  # Fail if dependencies cannot be installed

      # Run the article generation script
      - name: Run article generation script
        run: |
          echo "Starting article generation..."
          python generate_and_upload_keywords.py
        continue-on-error: true  # Allow the workflow to continue even if the script fails
        # The error will be caught later in the next steps

      # Verify if the article generation script was successful or failed
      - name: Verify article generation success
        run: |
          if [ $? -eq 0 ]; then
            echo "Article generation completed successfully!"
          else
            echo "Error: Article generation script failed!"
            exit 1
        continue-on-error: false  # This will stop the workflow if the script fails

      # Upload the generated articles to S3 (if the generation is successful)
      - name: Upload to S3
        if: success()  # Only run if the article generation was successful
        run: |
          echo "Uploading articles to S3..."
          aws s3 cp path/to/generated/file s3://your-bucket-name/ --recursive
        continue-on-error: true  # Allows for non-blocking failure if upload fails

      # Notify of failure (in case upload or generation failed)
      - name: Notify failure
        if: failure()  # Only run if there's a failure in any previous step
        run: |
          echo "The daily article generation process failed. Please check the logs for more details."
        continue-on-error: true  # Ensures the workflow continues even after failure
