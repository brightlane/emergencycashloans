name: Daily Articles Workflow

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  generate_articles:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from your repository
      - name: Checkout repository code
        uses: actions/checkout@v3
        continue-on-error: false

      # Set up Python environment
      - name: Set up Python environment
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
        continue-on-error: false

      # Install dependencies
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: false

      # Run article generation script with debug info
      - name: Run article generation script
        run: |
          echo "Starting article generation..."
          python generate_and_upload_keywords.py || { echo 'Script failed!'; exit 1; }
        continue-on-error: true  # This will allow the workflow to continue even if this step fails
          
      # Check if the previous step was successful
      - name: Verify article generation success
        run: |
          echo "Verifying article generation..."
          if [ $? -eq 0 ]; then
            echo "Article generation completed successfully!"
          else
            echo "Error: Article generation script failed!"
            exit 1
        continue-on-error: false

      # Upload to S3 if successful
      - name: Upload to S3
        if: success()  # Run only if the previous steps were successful
        run: |
          echo "Uploading articles to S3..."
          aws s3 cp path/to/generated/file s3://your-bucket-name/ --recursive
        continue-on-error: true

      # Notify failure if any step failed
      - name: Notify failure
        if: failure()
        run: |
          echo "The daily article generation process failed. Please check the logs for more details."
        continue-on-error: true
