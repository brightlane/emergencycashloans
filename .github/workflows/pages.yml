name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python (if necessary)
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      # Install dependencies (e.g., if you use Python-based static site generation)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Ensure this includes any build tools like Jekyll, Hugo, etc.

      # Run your site build command (adjust this depending on your setup)
      - name: Build the site
        run: |
          python your_build_command.py  # Replace with your actual build step, e.g., `jekyll build`

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # This is where the site will be deployed
          folder: _site    # The folder that contains your built site (e.g., `_site` for Jekyll)
          token: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for deployment
