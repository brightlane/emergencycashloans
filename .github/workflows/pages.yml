name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger deployment on push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Set up Python (optional if you're using Python for site generation)
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x

      # Step 3: Install dependencies (if any, you may not need this step if it's static content)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt  # if you have requirements.txt

      # Step 4: Build your site (if necessary, depending on your setup)
      - name: Build site
        run: |
          echo "Building the site"
          # Your actual build commands here

      # Step 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_id: ${{ steps.upload.outputs.artifact_id }}
          pages_build_version: ${{ github.sha }}
        environment:
          name: github-pages  # Deployment environment to GitHub Pages
