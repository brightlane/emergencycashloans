name: Pages Workflow (Stable)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          echo "=== CHECKING FILES ==="
          ls -la
          echo "=== CHECKING PAGES ==="
          ls -la pages || echo "No pages folder found"

      - name: Validate HTML files exist
        run: |
          if [ ! -d "pages" ]; then
            echo "pages folder missing - nothing to do"
            exit 0
          fi

          count=$(ls pages/*.html 2>/dev/null | wc -l || true)
          echo "HTML files found: $count"

          if [ "$count" -eq 0 ]; then
            echo "No HTML pages found"
          fi

      - name: Finish safely
        run: |
          echo "Pages workflow completed successfully"
