name: Multi-task Automation - Run Every Minute

on:
  schedule:
    - cron: '* * * * *'  # Run every minute
  workflow_dispatch:  # This allows manual triggering if needed

jobs:
  # Job 1: Generate Articles
  generate_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the article generation script
        run: |
          python generate_and_upload_keywords.py || { echo 'Script failed!'; exit 1; }

  # Job 2: Generate Sitemaps
  generate_sitemaps:
    runs-on: ubuntu-latest
    needs: generate_articles  # Ensure this job runs after the previous one if needed
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
      - name: Run Sitemap Generator
        run: |
          python generate_sitemap.py || { echo 'Sitemap generation failed!'; exit 1; }

  # Job 3: Upload to S3
  upload_to_s3:
    runs-on: ubuntu-latest
    needs: generate_articles  # Ensure this job runs after the article generation
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Upload to S3
        run: |
          aws s3 cp path/to/generated/file s3://your-bucket-name/ --recursive

  # Job 4: SEO Enhancement
  seo_enhancement:
    runs-on: ubuntu-latest
    needs: generate_articles  # Runs after article generation
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
      - name: Run SEO Enhancement script
        run: |
          python seo_enhancement.py || { echo 'SEO Enhancement failed!'; exit 1; }

  # Job 5: Content Expansion
  content_expansion:
    runs-on: ubuntu-latest
    needs: generate_articles  # Runs after article generation
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run Content Expansion script
        run: |
          python content_expansion.py || { echo 'Content Expansion failed!'; exit 1; }

  # Additional Jobs can be added here following the same pattern...
